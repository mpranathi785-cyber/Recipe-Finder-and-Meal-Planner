<!DOCTYPE html>
<html>
<head>
    <title>Recipe Finder and Meal Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Recipe Finder and Meal Planner</h1>

<h2>Recipe Finder</h2>
<input type="text" id="ingredient" placeholder="Enter ingredient">
<button onclick="findRecipe()">Search</button>

<p id="result"></p>

<hr>

<h2>Weekly Meal Planner</h2>

<select id="day">
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
    <option>Thursday</option>
    <option>Friday</option>
    <option>Saturday</option>
    <option>Sunday</option>
</select>

<input type="text" id="meal" placeholder="Enter meal">
<button onclick="addMeal()">Add Meal</button>

<ul id="mealList"></ul>

<hr>

<h2>Favorite Recipes</h2>

<button onclick="addFavorite()">Add Current Recipe</button>

<ul id="favoriteList"></ul>

<hr>

<h2>Shopping List</h2>

<button onclick="generateShopping()">Generate Shopping List</button>

<ul id="shoppingList"></ul>

<script src="script.js"></script>
<footer>
    <p>© 2026 Recipe Finder and Meal Planner | Designed by Team</p>
</footer>
</body>
</html>
